# RAG Evaluation Framework — Nginx reverse proxy configuration
# Place at: /etc/nginx/sites-available/rag-evaluation-framework
# Enable: ln -s /etc/nginx/sites-available/rag-evaluation-framework /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API Proxy ────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_http_version 1.1;

        # Rate limiting (optional)
        limit_req zone=api burst=20 nodelay;
    }

    # ── Dashboard Proxy ──────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_http_version 1.1;

        # WebSocket support (for Next.js HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static Assets ────────────────────────────────────────
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Logging ─────────────────────────────────────────────
    access_log /var/log/nginx/rag-evaluation-framework.access.log;
    error_log /var/log/nginx/rag-evaluation-framework.error.log;
}

# Rate limit zone (define in http block of /etc/nginx/nginx.conf)
# limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
